services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistemaos-backend
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-sistema-os-jwt-secret-super-seguro-minimo-32-caracteres}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"
    restart: on-failure
